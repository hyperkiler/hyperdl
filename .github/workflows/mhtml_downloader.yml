- name: Setup Git LFS
  run: |
    git lfs install
    git lfs track "*.exe"
    git add .gitattributes
    git commit -m "track exe files" || true

- name: Download large file
  run: |
    wget https://example.com/big-file.exe -O downloads/big-file.exe

- name: Commit and push
  run: |
    git add downloads/big-file.exe
    git commit -m "add large file"
    git push
